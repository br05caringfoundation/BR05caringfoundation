<!DOCTYPE html>
<html>
<head>
<title>BR05 Caring Foundation</title>

<style>

/* HEADER */
.header {
  text-align:center;
  padding:15px;
}
.logo {
  width:70px;
  border-radius:50%;
}
.site-name {
  color:orange;
  font-style:italic;
}

/* DONATE */
.donate-section {
  background:url("donate-bg.jpg") center/cover no-repeat;
  padding:40px;
  text-align:center;
  color:white;
  border-radius:15px;
  margin:20px;
}

/* BUTTON */
.btn {
  padding:10px 20px;
  background:#ff5722;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}
.modal-content {
  background:white;
  padding:20px;
  border-radius:10px;
}

/* SLIDER */
.slider-container {
  position:relative;
  overflow:hidden;
  margin:20px;
}
.slider-track {
  display:flex;
  transition:0.6s;
}
.poster {
  min-width:100%;
  height:180px;
}
.poster img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ARROWS */
.prev, .next {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:#ff5722;
  color:#fff;
  border:none;
  padding:8px;
  cursor:pointer;
}
.prev { left:10px; }
.next { right:10px; }

/* ADMIN PANEL */
#admin {
  display:none;
  text-align:center;
  margin:20px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="logo.png" class="logo">
  <h1 class="site-name">BR05 Caring Foundation</h1>
</div>

<!-- DONATE -->
<div class="donate-section">
  <h2>Support Us ❤️</h2>
  <button class="btn" onclick="donate()">Donate QR</button>
  <br><br>
  <a href="upi://pay?pa=yourupiid@upi&pn=BR05&cu=INR">
    <button class="btn">Pay via UPI</button>
  </a>
</div>

<!-- MODAL -->
<div id="qrModal" class="modal">
  <div class="modal-content">
    <img src="qr.png" width="250">
  </div>
</div>

<!-- SLIDER -->
<h2 style="text-align:center;">💖 Our Supporters</h2>

<div class="slider-container">
  <button class="prev" onclick="move(-1)">❮</button>

  <div class="slider-track" id="slider">
    <div class="poster"><img src="img1.jpg"></div>
    <div class="poster"><img src="img2.jpg"></div>
    <div class="poster"><img src="img3.jpg"></div>
  </div>

  <button class="next" onclick="move(1)">❯</button>
</div>

<!-- ADMIN BUTTON -->
<div style="text-align:center;">
  <button onclick="showAdmin()">Admin Upload</button>
</div>

<!-- ADMIN PANEL -->
<div id="admin">
  <input type="file" id="upload">
</div>

<script>

/* DONATE */
function donate(){
  document.getElementById("qrModal").style.display="flex";
}

/* CLOSE MODAL */
let modal = document.getElementById("qrModal");
modal.onclick=function(e){
  if(e.target==modal){
    modal.style.display="none";
  }
}

/* SLIDER */
let index=0;
function move(step){
  let slider=document.getElementById("slider");
  let total=slider.children.length;
  index=(index+step+total)%total;
  slider.style.transform=`translateX(-${index*100}%)`;
}
setInterval(()=>move(1),4000);

/* ADMIN */
function showAdmin(){
  let pass=prompt("Enter admin password");
  if(pass=="1234"){
    document.getElementById("admin").style.display="block";
  }
}

/* UPLOAD PREVIEW */
document.getElementById("upload").onchange=function(e){
  let file=e.target.files[0];
  if(file){
    let url=URL.createObjectURL(file);
    let div=document.createElement("div");
    div.className="poster";
    div.innerHTML=`<img src="${url}">`;
    document.getElementById("slider").appendChild(div);
  }
}

</script>

</body>
</html>
