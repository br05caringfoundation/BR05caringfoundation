<!DOCTYPE html>
<html>
<head>
<title>BR05 Caring Foundation</title>

<style>

/* HEADER */
.header {
  text-align: center;
  padding: 15px;
}

.logo {
  width: 70px;
  height: 70px;
  border-radius: 50%;
}

.site-name {
  color: orange;
  font-style: italic;
  font-size: 26px;
}

/* DONATE SECTION */
.donate-section {
  background: url("donate-bg.jpg") center/cover no-repeat;
  padding: 40px;
  text-align: center;
  color: white;
  border-radius: 15px;
  margin: 20px;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background:#fff;
  padding:20px;
  border-radius:10px;
}

/* SUPPORTER POSTER */
.supporter-box {
  width: 100%;
  max-width: 500px;
  margin: 20px auto;
}

.poster {
  width: 100%;
  height: 180px;
  border-radius: 15px;
  overflow: hidden;
  background: #fff;
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
}

.poster img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* IMAGE UPLOAD */
#preview {
  width:100%;
  max-width:300px;
  display:none;
  border-radius:10px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="logo.png" class="logo">
  <h1 class="site-name">BR05 Caring Foundation</h1>
</div>

<!-- DONATE -->
<div class="donate-section">
  <h2>Support Us ❤️</h2>
  <button onclick="donate()">Donate Now</button>
</div>

<!-- QR MODAL -->
<div id="qrModal" class="modal">
  <div class="modal-content">
    <img src="qr.png" width="250">
  </div>
</div>

<!-- SUPPORTER -->
<h2 style="text-align:center; color:#ff5722;">💖 Our Proud Supporters</h2>

<div class="supporter-box">
  <div class="poster">
    <img src="https://i.ibb.co/HT9MvL21/file-00000000ba4071faa167323bc8428fb9.jpg">
  </div>
</div>

<!-- IMAGE UPLOAD -->
<div style="text-align:center; margin:20px;">
  <input type="file" id="upload" accept="image/*">
  <br><br>
  <img id="preview">
</div>

<script>

/* DONATE OPEN */
function donate(){
  document.getElementById("qrModal").style.display = "flex";
}

/* CLOSE ON OUTSIDE CLICK */
let modal = document.getElementById("qrModal");

modal.onclick = function(event){
  if(event.target == modal){
    modal.style.display = "none";
  }
}

/* IMAGE PREVIEW */
document.getElementById("upload").onchange = function(e){
  let file = e.target.files[0];
  if(file){
    let url = URL.createObjectURL(file);
    let img = document.getElementById("preview");
    img.src = url;
    img.style.display = "block";
  }
}

</script>

</body>
</html>
