<!DOCTYPE html>
<html>
<head>
<title>BR05 Caring Foundation</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f3f3f3;
}

/* NAVBAR */
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:white;
  border-radius:0 0 20px 20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
.nav h2{
  margin:0;
}
.nav a{
  margin:0 10px;
  text-decoration:none;
  color:black;
  font-weight:bold;
}

/* HERO */
.hero{
  margin:15px;
  padding:20px;
  background:#f5d7b5;
  border-radius:20px;
  text-align:center;
}
.hero h1{
  color:#ff5722;
}

/* QR BOX */
.qr-box{
  margin-top:15px;
  border:5px solid orange;
  border-radius:20px;
  padding:10px;
  display:inline-block;
}
.qr-box img{
  width:220px;
  border-radius:15px;
}

/* DONATE */
.donate-btn{
  margin-top:15px;
  padding:12px 25px;
  background:#ff5722;
  color:white;
  border:none;
  border-radius:25px;
  font-size:16px;
}

/* SUPPORTERS */
.support{
  margin:15px;
}
.support h2{
  color:#ff5722;
}

/* SLIDER */
.slider{
  overflow:hidden;
  border-radius:20px;
  background:#f5d7b5;
  padding:10px;
}
.track{
  display:flex;
  transition:0.5s;
}
.slide{
  min-width:100%;
}
.slide img{
  width:100%;
  border-radius:15px;
}

/* BUTTONS */
.btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:#ff5722;
  color:white;
  border:none;
  padding:8px;
  border-radius:50%;
}
.prev{ left:10px; }
.next{ right:10px; }

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="nav">
  <h2>BR05</h2>
  <div>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Your small help can change someone’s life ❤️</h1>

  <div class="qr-box">
    <img src="qr.png">
  </div>

  <h3>💖 Support Our Mission – Every Help Matters</h3>

  <button class="donate-btn">💰 Donate Now</button>
</div>

<!-- SUPPORTERS -->
<div class="support">
  <h2>💖 Our Proud Supporters</h2>

  <div class="slider">
    <button class="btn prev" onclick="move(-1)">❮</button>

    <div class="track" id="track">
      <div class="slide"><img src="s1.jpg"></div>
      <div class="slide"><img src="s2.jpg"></div>
      <div class="slide"><img src="s3.jpg"></div>
    </div>

    <button class="btn next" onclick="move(1)">❯</button>
  </div>
</div>

<script>

let index=0;

function move(step){
  let track=document.getElementById("track");
  let total=track.children.length;

  index=(index+step+total)%total;
  track.style.transform=`translateX(-${index*100}%)`;
}

/* AUTO SLIDE */
setInterval(()=>move(1),4000);

</script>

</body>
</html>
