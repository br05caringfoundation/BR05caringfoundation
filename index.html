<!DOCTYPE html>
<html>
<head>
<title>BR05 Caring Foundation</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f5f5f5;
}

/* HEADER */
.header{
  text-align:center;
  background:#fff3e0;
  padding:15px;
}
.site-name{
  color:orange;
  font-style:italic;
  font-size:26px;
}

/* ABOUT */
.about{
  margin:15px;
  padding:15px;
  background:white;
  border-radius:10px;
}

/* DONATE */
.donate{
  margin:15px;
  padding:20px;
  background:linear-gradient(45deg,#ff9800,#ff5722);
  color:white;
  text-align:center;
  border-radius:15px;
}

button{
  padding:10px 20px;
  border:none;
  background:white;
  color:#ff5722;
  border-radius:8px;
  cursor:pointer;
}

/* POSTS */
.post{
  background:white;
  margin:15px;
  padding:10px;
  border-radius:10px;
}
.post img{
  width:100%;
  border-radius:10px;
}

/* SPONSOR */
.sponsor{
  margin:15px;
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}
.modal img{
  width:250px;
  background:white;
  padding:10px;
  border-radius:10px;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <h1 class="site-name">BR05 Caring Foundation</h1>
</div>

<!-- ABOUT -->
<div class="about">
  <h3>About Us</h3>
  <p>
    We help homeless, hungry and needy people ❤️  
    Join us to make a better world.
  </p>
</div>

<!-- DONATE -->
<div class="donate">
  <h2>Support Our Mission ❤️</h2>
  <button onclick="donate()">Donate Now</button>
</div>

<!-- QR MODAL -->
<div id="qrModal" class="modal">
  <img src="qr.png">
</div>

<!-- POSTS -->
<div class="post">
  <img src="work1.jpg">
  <p>Food distribution 🍛</p>
  <button onclick="like(this)">❤️ Like</button>
</div>

<div class="post">
  <img src="work2.jpg">
  <p>Helping homeless 🏠</p>
  <button onclick="like(this)">❤️ Like</button>
</div>

<!-- SPONSOR -->
<div class="sponsor">
  <h3>💖 Our Supporters</h3>
  <img src="sponsor.jpg" style="width:100%; border-radius:10px;">
</div>

<script>

/* DONATE */
function donate(){
  document.getElementById("qrModal").style.display="flex";
}

/* CLOSE */
let modal=document.getElementById("qrModal");
modal.onclick=function(e){
  if(e.target==modal){
    modal.style.display="none";
  }
}

/* LIKE */
function like(btn){
  btn.innerText="❤️ Liked";
}

</script>

</body>
                         </html>
